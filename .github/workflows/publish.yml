name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Standalone Executable
        run: |
          dotnet publish Aj179PStat.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true -o ./release-output

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aj179PStat-win-x64
          path: ./release-output/Aj179PStat.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./release-output/Aj179PStat.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
